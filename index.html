<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vita — AI Health Reminder Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F7F4;
    --panel:#FFFFFF;
    --ink:#16241F;
    --ink-soft:#54655D;
    --teal:#2F6F62;
    --teal-deep:#1D4A40;
    --coral:#DD6C4B;
    --gold:#BE8F35;
    --line:#DCE6E0;
    --line-soft:#EAF0EC;
    --upcoming:#9CB0A6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:1180px;
    margin:0 auto;
    padding:28px 24px 40px;
  }

  /* ---------- Header ---------- */
  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    margin-bottom:26px;
    flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle at 32% 28%, #4C8C7C, var(--teal-deep));
    box-shadow:0 0 0 4px rgba(47,111,98,0.12);
    flex-shrink:0;
  }
  .brand-text h1{
    font-family:'Newsreader',serif;
    font-style:italic;
    font-weight:500;
    font-size:28px;
    margin:0;
    line-height:1;
    letter-spacing:0.2px;
  }
  .brand-text p{
    margin:4px 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
    letter-spacing:0.3px;
  }

  .streak-pill{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 18px 8px 8px;
  }
  .streak-ring{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:conic-gradient(var(--gold) calc(var(--pct,70)*1%), var(--line-soft) 0);
    font-family:'IBM Plex Mono',monospace;
  }
  .streak-ring span{
    width:26px;height:26px;border-radius:50%;background:var(--panel);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;color:var(--ink);
  }
  .streak-label{font-size:12px;color:var(--ink-soft);}
  .streak-label b{color:var(--ink); font-size:13px;}

  /* ---------- Layout ---------- */
  .grid{
    display:grid;
    grid-template-columns:1fr 1.15fr;
    gap:22px;
    align-items:start;
  }
  @media (max-width:880px){ .grid{grid-template-columns:1fr;} }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    padding:22px 22px 24px;
  }
  .panel h2{
    font-family:'Newsreader',serif;
    font-weight:500;
    font-size:19px;
    margin:0 0 4px;
  }
  .panel .sub{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:0 0 18px;
  }

  /* ---------- Timeline ---------- */
  .timeline{position:relative; padding-left:6px;}
  .timeline::before{
    content:"";
    position:absolute;
    left:29px; top:6px; bottom:6px;
    width:1px;
    background:var(--line);
  }
  .t-item{
    display:grid;
    grid-template-columns:52px 1fr;
    gap:14px;
    position:relative;
    margin-bottom:6px;
  }
  .t-time{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    text-align:right;
    padding-top:14px;
  }
  .t-dot-col{position:relative;}
  .t-dot{
    position:absolute; left:23px; top:16px;
    width:11px;height:11px;border-radius:50%;
    background:var(--upcoming);
    border:2px solid var(--panel);
    box-shadow:0 0 0 1px var(--line);
    z-index:2;
  }
  .t-item[data-status="taken"] .t-dot{background:var(--teal); box-shadow:0 0 0 1px var(--teal);}
  .t-item[data-status="skipped"] .t-dot{background:var(--coral); box-shadow:0 0 0 1px var(--coral);}
  .t-item[data-status="snoozed"] .t-dot{background:var(--gold); box-shadow:0 0 0 1px var(--gold);}

  .r-card{
    grid-column:2;
    background:var(--bg);
    border:1px solid var(--line-soft);
    border-radius:12px;
    padding:12px 14px;
    margin-left:16px;
  }
  .r-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .r-name{font-size:14.5px; font-weight:600;}
  .r-detail{font-size:12.5px; color:var(--ink-soft); margin-top:2px;}
  .r-badge{
    font-size:10.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.4px;
    padding:3px 8px;
    border-radius:999px;
    white-space:nowrap;
    background:var(--line-soft);
    color:var(--ink-soft);
  }
  .r-card[data-status="taken"] .r-badge{background:rgba(47,111,98,0.12); color:var(--teal-deep);}
  .r-card[data-status="skipped"] .r-badge{background:rgba(221,108,75,0.14); color:var(--coral);}
  .r-card[data-status="snoozed"] .r-badge{background:rgba(190,143,53,0.16); color:var(--gold);}

  .r-actions{display:flex; gap:6px; margin-top:10px;}
  .r-actions button{
    flex:1;
    font-family:'Inter',sans-serif;
    font-size:12px;
    font-weight:600;
    padding:7px 0;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink);
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease;
  }
  .r-actions button:hover{border-color:var(--teal); transform:translateY(-1px);}
  .r-actions button:disabled{opacity:0.4; cursor:default; transform:none;}
  .r-actions .take{color:var(--teal-deep);}
  .r-actions .skip{color:var(--coral);}

  /* ---------- Weekly strip ---------- */
  .week{display:flex; gap:6px; margin-top:18px;}
  .week-bar{flex:1; text-align:center;}
  .week-bar .bar-track{
    height:54px; width:100%; background:var(--line-soft);
    border-radius:6px; display:flex; align-items:flex-end; overflow:hidden;
  }
  .week-bar .bar-fill{width:100%; background:var(--teal); border-radius:6px 6px 0 0;}
  .week-bar .bar-day{font-size:10px; color:var(--ink-soft); margin-top:6px;}

  /* ---------- Chat ---------- */
  .chat-panel{display:flex; flex-direction:column; height:640px;}
  .chat-log{
    flex:1; overflow-y:auto; padding-right:4px; margin-bottom:14px;
    display:flex; flex-direction:column; gap:12px;
  }
  .msg{max-width:82%; font-size:14px; line-height:1.5;}
  .msg.user{
    align-self:flex-end;
    background:var(--teal);
    color:#fff;
    padding:10px 14px;
    border-radius:14px 14px 3px 14px;
  }
  .msg.assistant{
    align-self:flex-start;
    background:var(--bg);
    border:1px solid var(--line-soft);
    padding:10px 14px;
    border-radius:14px 14px 14px 3px;
  }
  .msg.system-note{
    align-self:center;
    color:var(--ink-soft);
    font-size:11.5px;
    font-family:'IBM Plex Mono',monospace;
    background:none;
  }
  .msg.error{
    align-self:flex-start;
    background:rgba(221,108,75,0.1);
    border:1px solid rgba(221,108,75,0.3);
    color:var(--coral);
    padding:10px 14px;
    border-radius:14px;
    font-size:13px;
  }
  .typing{align-self:flex-start; display:flex; gap:4px; padding:12px 14px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--upcoming);animation:bounce 1.1s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0); opacity:.5;} 30%{transform:translateY(-4px); opacity:1;}}

  .chat-input{display:flex; gap:8px; border-top:1px solid var(--line-soft); padding-top:14px;}
  .chat-input input{
    flex:1;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 14px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--bg);
  }
  .chat-input input:focus{outline:2px solid var(--teal); outline-offset:1px;}
  .chat-input button{
    background:var(--teal-deep);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:0 18px;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  .chat-input button:disabled{opacity:0.5; cursor:default;}

  .suggestions{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
  .suggestions button{
    font-size:12px;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--bg);
    color:var(--ink-soft);
    cursor:pointer;
  }
  .suggestions button:hover{border-color:var(--teal); color:var(--teal-deep);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <h1>Vita</h1>
        <p>your health reminder assistant</p>
      </div>
    </div>
    <div class="streak-pill">
      <div class="streak-ring" id="streakRing"><span id="streakNum">6</span></div>
      <div class="streak-label">day streak &nbsp;<b>keep it up</b></div>
    </div>
  </div>

  <div class="grid">

    <!-- LEFT: Today + Week -->
    <div class="panel">
      <h2>Today</h2>
      <p class="sub" id="todaySub">Sunday, 19 July — tap an action, or just tell Vita in chat.</p>
      <div class="timeline" id="timeline"></div>

      <h2 style="margin-top:24px;">This week</h2>
      <p class="sub">Adherence across your last 7 days.</p>
      <div class="week" id="weekStrip"></div>
    </div>

    <!-- RIGHT: Chat -->
    <div class="panel chat-panel">
      <h2>Ask Vita</h2>
      <p class="sub">Reschedule doses, log what you took, or ask a health question.</p>
      <div class="suggestions">
        <button data-q="I just took my morning Lisinopril">Log a dose</button>
        <button data-q="Move my evening Metformin to 9pm">Reschedule</button>
        <button data-q="Can I take ibuprofen with metformin?">Ask a question</button>
        <button data-q="Add a reminder to stretch at 7am daily">Add reminder</button>
      </div>
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" placeholder="Message Vita…" autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
/* ---------------- State ---------------- */
const state = {
  streak: 6,
  reminders: [
    { id:"r1", name:"Lisinopril", type:"medication", detail:"10mg — with water", time:"08:00", recurrence:"Daily", status:"upcoming" },
    { id:"r2", name:"Metformin", type:"medication", detail:"500mg — with breakfast", time:"08:00", recurrence:"Daily", status:"upcoming" },
    { id:"r3", name:"Afternoon walk", type:"habit", detail:"20 minutes, anywhere counts", time:"17:30", recurrence:"Daily", status:"upcoming" },
    { id:"r4", name:"Metformin", type:"medication", detail:"500mg — with dinner", time:"20:00", recurrence:"Daily", status:"upcoming" },
  ],
  history: [
    {day:"Mon", pct:100},{day:"Tue", pct:75},{day:"Wed", pct:100},
    {day:"Thu", pct:100},{day:"Fri", pct:50},{day:"Sat", pct:100},{day:"Sun", pct:0}
  ],
  nextId: 5
};

let messages = []; // Anthropic message history (excludes system prompt)

/* ---------------- Rendering ---------------- */
function fmtTime(t){
  const [h,m] = t.split(":").map(Number);
  const ampm = h>=12 ? "PM":"AM";
  const h12 = ((h+11)%12)+1;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

function sortReminders(){
  state.reminders.sort((a,b)=> a.time.localeCompare(b.time));
}

function renderTimeline(){
  sortReminders();
  const el = document.getElementById("timeline");
  el.innerHTML = "";
  state.reminders.forEach(r=>{
    const item = document.createElement("div");
    item.className = "t-item";
    item.dataset.status = r.status;
    item.innerHTML = `
      <div class="t-time">${fmtTime(r.time)}</div>
      <div class="t-dot-col"><div class="t-dot"></div></div>
    `;
    const card = document.createElement("div");
    card.className = "r-card";
    card.dataset.status = r.status;
    const badgeText = {upcoming:"Upcoming", taken:"Taken", skipped:"Skipped", snoozed:"Snoozed"}[r.status] || r.status;
    const disabled = r.status !== "upcoming" && r.status !== "snoozed" ? "disabled" : "";
    card.innerHTML = `
      <div class="r-top">
        <div>
          <div class="r-name">${r.name}</div>
          <div class="r-detail">${r.detail || ""} · ${r.recurrence}</div>
        </div>
        <div class="r-badge">${badgeText}</div>
      </div>
      <div class="r-actions">
        <button class="take" ${disabled} data-id="${r.id}" data-action="taken">Taken</button>
        <button data-id="${r.id}" data-action="snoozed">Snooze 15m</button>
        <button class="skip" ${disabled} data-id="${r.id}" data-action="skipped">Skip</button>
      </div>
    `;
    el.appendChild(item);
    el.appendChild(card);
  });

  el.querySelectorAll(".r-actions button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const r = state.reminders.find(x=>x.id===id);
      if(!r) return;
      const phrase = {
        taken: `I just took my ${r.name} (${fmtTime(r.time)} dose).`,
        skipped: `Please skip my ${r.name} for now — I'm not going to take that one.`,
        snoozed: `Snooze my ${r.name} reminder by 15 minutes.`
      }[action];
      document.getElementById("chatInput").value = "";
      sendUserMessage(phrase);
    });
  });
}

function renderStreak(){
  document.getElementById("streakNum").textContent = state.streak;
  document.getElementById("streakRing").style.setProperty("--pct", Math.min(100, state.streak*10));
}

function renderWeek(){
  const el = document.getElementById("weekStrip");
  el.innerHTML = "";
  state.history.forEach(d=>{
    const wrap = document.createElement("div");
    wrap.className = "week-bar";
    wrap.innerHTML = `
      <div class="bar-track"><div class="bar-fill" style="height:${Math.max(6,d.pct)}%;"></div></div>
      <div class="bar-day">${d.day}</div>
    `;
    el.appendChild(wrap);
  });
}

function renderAll(){ renderTimeline(); renderStreak(); renderWeek(); }
renderAll();

/* ---------------- Tools ---------------- */
const TOOLS = [
  {
    name: "mark_dose",
    description: "Mark an existing reminder as taken, skipped, or snoozed. Always use the reminder_id from the current reminders list provided in context — never invent one.",
    input_schema: {
      type: "object",
      properties: {
        reminder_id: { type: "string", description: "The id of the reminder, e.g. r1." },
        status: { type: "string", enum: ["taken","skipped","snoozed"] },
        snooze_minutes: { type: "integer", description: "Only used when status is snoozed. Defaults to 15." }
      },
      required: ["reminder_id","status"]
    }
  },
  {
    name: "add_reminder",
    description: "Create a new reminder on the user's schedule — a medication, appointment, or habit.",
    input_schema: {
      type: "object",
      properties: {
        name: { type: "string" },
        type: { type: "string", enum: ["medication","appointment","habit"] },
        time: { type: "string", description: "24-hour HH:MM time, e.g. 07:00" },
        detail: { type: "string", description: "Short note, e.g. dose or context." },
        recurrence: { type: "string", description: "e.g. Daily, Weekdays, Once" }
      },
      required: ["name","type","time"]
    }
  },
  {
    name: "reschedule_reminder",
    description: "Change the time of an existing reminder.",
    input_schema: {
      type: "object",
      properties: {
        reminder_id: { type: "string" },
        new_time: { type: "string", description: "24-hour HH:MM time" }
      },
      required: ["reminder_id","new_time"]
    }
  },
  {
    name: "get_adherence_summary",
    description: "Get the user's current streak and adherence percentages for the last 7 days.",
    input_schema: { type: "object", properties: {} }
  }
];

function executeTool(name, input){
  if(name === "mark_dose"){
    const r = state.reminders.find(x=>x.id===input.reminder_id);
    if(!r) return { error: "No reminder with that id. Valid ids: " + state.reminders.map(x=>x.id).join(", ") };
    r.status = input.status;
    if(input.status === "taken") state.streak = state.streak + (Math.random()<0.4 ? 1 : 0);
    return { success: true, reminder: r };
  }
  if(name === "add_reminder"){
    const id = "r" + (state.nextId++);
    const rem = { id, name: input.name, type: input.type || "habit", detail: input.detail || "", time: input.time, recurrence: input.recurrence || "Daily", status: "upcoming" };
    state.reminders.push(rem);
    return { success: true, reminder: rem };
  }
  if(name === "reschedule_reminder"){
    const r = state.reminders.find(x=>x.id===input.reminder_id);
    if(!r) return { error: "No reminder with that id. Valid ids: " + state.reminders.map(x=>x.id).join(", ") };
    r.time = input.new_time;
    return { success: true, reminder: r };
  }
  if(name === "get_adherence_summary"){
    return { streak: state.streak, last_7_days: state.history };
  }
  return { error: "Unknown tool: " + name };
}

/* ---------------- System prompt ---------------- */
function buildSystemPrompt(){
  const list = state.reminders.map(r =>
    `- id:${r.id} | ${r.name} | ${r.type} | ${fmtTime(r.time)} | ${r.detail} | ${r.recurrence} | status:${r.status}`
  ).join("\n");

  return `You are Vita, a warm, concise AI health reminder assistant inside a reminder app. Today is Sunday, 19 July 2026.

The user's current reminders (use these exact ids with tools, never invent an id):
${list}

Current streak: ${state.streak} days.

How to behave:
- Keep replies short: 1-3 sentences by default.
- When the user reports taking, skipping, or wanting to snooze something, call mark_dose. Match it to the right reminder from the list above by name/time — don't ask which one if it's reasonably clear.
- When the user asks to add something, call add_reminder. When they ask to move a time, call reschedule_reminder.
- After a tool call succeeds, confirm briefly and naturally (e.g. mention a streak or encouragement occasionally, not every time).
- You may answer general health/medication questions (typical uses, common side effects, general interaction categories) using your own knowledge, in plain language. Always close such answers with a brief note to confirm specifics with a pharmacist or doctor, since you don't have access to the user's full medical history.
- You are not a diagnostic tool. Never diagnose symptoms or recommend specific dosages beyond what's already on the user's schedule.
- If a message suggests a medical emergency, overdose, or self-harm, do not use any tool. Immediately and clearly advise contacting local emergency services right away, and keep the tone calm and direct.
- Never guilt or shame the user for a missed or skipped dose — stay encouraging.`;
}

/* ---------------- Chat plumbing ---------------- */
const chatLog = document.getElementById("chatLog");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");

function addBubble(role, text){
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  return div;
}

function showTyping(){
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typingIndicator";
  div.innerHTML = "<span></span><span></span><span></span>";
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}
function hideTyping(){
  const t = document.getElementById("typingIndicator");
  if(t) t.remove();
}

function setBusy(busy){
  sendBtn.disabled = busy;
  chatInput.disabled = busy;
}

async function callClaude(){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: buildSystemPrompt(),
      messages: messages,
      tools: TOOLS
    })
  });
  if(!res.ok){
    throw new Error("Vita couldn't reach the assistant service (status " + res.status + ").");
  }
  return res.json();
}

async function sendUserMessage(text){
  if(!text || !text.trim()) return;
  addBubble("user", text);
  messages.push({ role: "user", content: text });
  setBusy(true);
  showTyping();

  try{
    let guard = 0;
    while(guard < 5){
      guard++;
      const data = await callClaude();
      const content = data.content || [];
      const toolUses = content.filter(b => b.type === "tool_use");
      const textParts = content.filter(b => b.type === "text").map(b => b.text).join("\n").trim();

      messages.push({ role: "assistant", content: content });

      if(toolUses.length === 0){
        hideTyping();
        addBubble("assistant", textParts || "Done.");
        break;
      }

      // Execute each tool call locally
      const toolResults = toolUses.map(tu => ({
        type: "tool_result",
        tool_use_id: tu.id,
        content: JSON.stringify(executeTool(tu.name, tu.input))
      }));

      if(textParts){
        hideTyping();
        addBubble("assistant", textParts);
        showTyping();
      }

      renderAll(); // reflect state change immediately in the UI
      messages.push({ role: "user", content: toolResults });
    }
  }catch(err){
    hideTyping();
    addBubble("error", err.message || "Something went wrong reaching Vita. Please try again.");
  }finally{
    hideTyping();
    setBusy(false);
  }
}

sendBtn.addEventListener("click", ()=>{
  const text = chatInput.value;
  chatInput.value = "";
  sendUserMessage(text);
});
chatInput.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    const text = chatInput.value;
    chatInput.value = "";
    sendUserMessage(text);
  }
});
document.querySelectorAll(".suggestions button").forEach(btn=>{
  btn.addEventListener("click", ()=> sendUserMessage(btn.dataset.q));
});

/* Opening message from Vita — static, no API call needed */
addBubble("assistant", "Hi, I'm Vita. I can see your schedule for today — tap an action on the left, or just tell me things like \u201cI took my Metformin\u201d or \u201cmove my walk to 6pm.\u201d");
</script>
