
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Health Assistant Pro</title>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:linear-gradient(135deg,#e8f7ff,#f6fff7)}
.header{background:linear-gradient(135deg,#0a84ff,#00b894);color:#fff;text-align:center;padding:25px}
.container{max-width:1100px;margin:auto;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:15px 0}
.card{background:#fff;border-radius:15px;padding:15px;box-shadow:0 4px 10px rgba(0,0,0,.1);text-align:center}
#chat{height:500px;background:#fff;border-radius:18px;padding:15px;overflow:auto;box-shadow:0 4px 15px rgba(0,0,0,.15)}
.msg{padding:12px;border-radius:14px;margin:10px 0;max-width:78%}
.user{background:#d6eeff;margin-left:auto}.bot{background:#edfcef}
.input{display:flex;gap:10px;margin-top:15px}input{flex:1;padding:14px;border-radius:10px;border:1px solid #ccc}button{background:#0a84ff;color:#fff;border:none;padding:14px 18px;border-radius:10px;cursor:pointer}
.quick{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0}.quick button{padding:8px 12px}
</style></head><body>
<div class='header'><h1>🏥 AI Health Assistant Pro</h1><p>Interactive Health Guidance • Wellness Tips • Lifestyle Coaching</p></div>
<div class='container'>
<div class='cards'>
<div class='card'>💧 Hydration</div><div class='card'>😴 Sleep</div><div class='card'>🏃 Fitness</div><div class='card'>🥗 Nutrition</div><div class='card'>❤️ Heart Health</div>
</div>
<div class='quick'>
<button onclick="ask('How much water should I drink?')">Water</button>
<button onclick="ask('How much sleep do I need?')">Sleep</button>
<button onclick="ask('How can I lose weight?')">Weight Loss</button>
<button onclick="ask('Tips for stress management')">Stress</button>
<button onclick="ask('Healthy diet tips')">Diet</button>
</div>
<div id='chat'><div class='msg bot'>👋 Hello! Ask me a health question.</div></div>
<div class='input'><input id='txt'><button onclick='send()'>Send</button></div>
</div>
<script>
const knowledge={
'water':'Most adults benefit from about 2-3 liters of water daily. Needs vary by activity and environment.',
'sleep':'Adults generally need 7-9 hours of quality sleep every night.',
'exercise':'Aim for at least 150 minutes of moderate exercise per week.',
'diet':'Focus on vegetables, fruits, lean protein, whole grains, and hydration.',
'weight':'Weight loss works best with healthy eating, regular activity, and consistency.',
'stress':'Deep breathing, exercise, sleep, and mindfulness can help reduce stress.',
'bmi':'BMI = weight (kg) divided by height squared (m²).',
'heart':'Regular exercise and limiting processed foods support heart health.',
'blood pressure':'Reduce salt intake, exercise regularly, and monitor readings.',
'diabetes':'Maintain healthy eating habits and monitor blood sugar as advised.',
'vitamin d':'Vitamin D supports bone and immune health.',
'protein':'Protein helps build and repair muscles and tissues.',
'walking':'A brisk 30-minute walk daily provides significant benefits.',
'cholesterol':'Increase fiber intake and limit saturated fats.',
'anxiety':'Practice relaxation techniques and maintain healthy routines.',
'headache':'Hydration, rest, and stress reduction may help common headaches.',
'cold':'Rest, fluids, and proper nutrition support recovery.',
'immunity':'Sleep, exercise, and a balanced diet support immunity.',
'breakfast':'A balanced breakfast can improve energy and focus.',
'steps':'Many people target around 8,000 to 10,000 steps daily.'
};
function add(t,c){let d=document.createElement('div');d.className='msg '+c;d.innerHTML=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
function answer(q){q=q.toLowerCase();for(let k in knowledge){if(q.includes(k)) return knowledge[k];}return 'I can help with hydration, sleep, exercise, diet, BMI, stress, cholesterol, immunity, walking, blood pressure and more. Try asking a specific health question.';}
function send(){let t=txt.value.trim();if(!t)return;add(t,'user');setTimeout(()=>add('🤖 '+answer(t),'bot'),400);txt.value='';}
function ask(q){txt.value=q;send();}
txt.addEventListener('keypress',e=>{if(e.key==='Enter')send();});
</script></body></html>
