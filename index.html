<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Health Assistant Ultimate</title><style>body{font-family:Arial;margin:0;background:linear-gradient(135deg,#e8f7ff,#f5fff5)}header{background:#0a84ff;color:#fff;padding:20px;text-align:center}.wrap{max-width:1200px;margin:auto;padding:20px}.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin:10px 0}#chat{height:350px;overflow:auto}.msg{padding:10px;border-radius:10px;margin:8px 0}.u{background:#d8edff}.b{background:#eefcee}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}input,button{padding:10px;margin:5px}button{background:#0a84ff;color:#fff;border:none;border-radius:8px}</style></head><body><header><h1>🏥 AI Health Assistant Ultimate</h1></header><div class="wrap"><div class="grid"><div class="card"><h3>💬 Health Assistant</h3><div id="chat"><div class="msg b">Hello! Ask me about sleep, diet, stress, exercise, hydration, BMI, calories, blood pressure and more.</div></div><input id="q" placeholder="Ask a health question"><button onclick="send()">Send</button></div><div><div class="card"><h3>BMI Calculator</h3><input id="h" placeholder="Height cm"><input id="w" placeholder="Weight kg"><button onclick="bmi()">Calculate BMI</button><p id="bmiout"></p></div><div class="card"><h3>Calorie Calculator</h3><input id="age" placeholder="Age"><input id="weight" placeholder="Weight kg"><input id="height" placeholder="Height cm"><button onclick="cal()">Estimate Calories</button><p id="calout"></p></div></div></div></div><script>const db={sleep:'Adults generally need 7-9 hours of sleep.',water:'Drink about 2-3 liters daily.',diet:'Focus on fruits, vegetables, protein and whole grains.',exercise:'Aim for 150 minutes of exercise weekly.',stress:'Practice breathing techniques and regular exercise.',anxiety:'Healthy routines and relaxation can help.',headache:'Hydration and rest may help common headaches.',cold:'Rest and fluids support recovery.',immunity:'Sleep, exercise and nutrition support immunity.',heart:'Regular activity supports heart health.',pressure:'Monitor blood pressure and reduce excess salt.',diabetes:'Maintain healthy eating and follow medical advice.',cholesterol:'Increase fiber and reduce saturated fat.',protein:'Protein helps muscle repair.',vitamin:'Vitamins support overall wellness.',weight:'Consistent healthy eating and activity help weight management.',walking:'Daily walking has many benefits.',bmi:'BMI measures weight relative to height.',calorie:'Calories provide energy.',back pain:'Stretching and posture may help.',dizzy:'Stay hydrated and seek care if persistent.'};function add(t,c){chat.innerHTML+=`<div class="msg ${c}">${t}</div>`;chat.scrollTop=99999;}function reply(x){x=x.toLowerCase();if(x.includes('hello')||x.includes('hi')) return 'Hello! How can I help with your health and wellness questions?';if(x.includes('thank')) return 'You are welcome!';for(let k in db){if(x.includes(k)) return db[k];}return 'I can answer general wellness questions about sleep, hydration, nutrition, exercise, stress, BMI, calories, heart health and healthy habits. For medical emergencies contact a healthcare professional.';}function send(){let t=q.value;if(!t)return;add(t,'u');add(reply(t),'b');q.value='';}function bmi(){let h=parseFloat(document.getElementById('h').value)/100;let w=parseFloat(document.getElementById('w').value);let b=(w/(h*h)).toFixed(1);document.getElementById('bmiout').innerText='BMI: '+b;}function cal(){let a=parseFloat(age.value),w=parseFloat(weight.value),h=parseFloat(height.value);let c=Math.round(10*w+6.25*h-5*a+5);calout.innerText='Estimated daily calories: '+c;}</script></body></html>
